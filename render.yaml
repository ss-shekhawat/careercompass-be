services:
  - type: web
    name: careercompass-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /health

    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENV
        value: prod
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: PYTHON_VERSION
        value: "3.12.5"
